<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<title>Appunti Vocali</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;
  --accent:#e8ff47;--accent-dim:rgba(232,255,71,0.12);
  --text:#f0f0f0;--text-muted:#666;--danger:#ff4f4f;--done:#3ddc84;--note:#7eb8f7;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}
.header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:-0.5px;color:var(--accent)}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none;flex:1;flex-direction:column;overflow:hidden}
.tab-content.active{display:flex}

/* APPUNTI */
.notes-area{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:12px 14px}
.notes-text{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.7;resize:none;outline:none;transition:border-color .2s;overflow-y:auto}
.notes-text:focus{border-color:var(--note)}
.notes-text::placeholder{color:var(--text-muted);font-style:italic}
.notes-count{font-size:11px;color:var(--text-muted);text-align:right;margin-top:5px}
.notes-bottom{margin-top:8px;display:flex;gap:8px}
.mic-btn{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
.mic-btn.recording{background:rgba(255,79,79,.1);border-color:var(--danger);color:var(--danger);animation:recGlow 1s ease-in-out infinite}
@keyframes recGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,79,79,0)}50%{box-shadow:0 0 10px 2px rgba(255,79,79,.2)}}
.action-btn{background:var(--note);border:none;border-radius:10px;color:#0f0f0f;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;padding:12px 14px;cursor:pointer;white-space:nowrap}
.clear-btn{background:none;border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:13px;padding:12px 14px;cursor:pointer}
.clear-btn:hover{border-color:var(--danger);color:var(--danger)}

/* NOTE VELOCI */
.quick-area{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:12px 14px}
.quick-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.quick-list::-webkit-scrollbar{width:3px}
.quick-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.quick-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px;gap:8px;opacity:.5;text-align:center}
.quick-empty-icon{font-size:32px}

/* CARD NOTA */
.note-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;animation:slideIn .2s ease;transition:border-color .3s}
.note-item.done{border-color:var(--done);background:rgba(61,220,132,.05)}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.note-num{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--text-muted);flex-shrink:0;min-width:20px}
.note-item.done .note-num{color:var(--done)}
.note-text{flex:1;font-size:14px;line-height:1.4;color:var(--text);word-break:break-word}
/* CHECKBOX */
.check-wrap{flex-shrink:0;cursor:pointer}
.check-box{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .25s;background:var(--surface2)}
.check-box.checked{background:var(--done);border-color:var(--done)}
.check-box.checked::after{content:'✓';color:#0f0f0f;font-size:14px;font-weight:700;line-height:1}

/* PREVIEW DETTATURA */
.quick-preview{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 34px 10px 12px;font-size:13px;color:var(--text-muted);min-height:42px;display:flex;align-items:center;font-style:italic;position:relative;transition:border-color .2s;margin-bottom:8px}
.quick-preview.has-text{color:var(--text);font-style:normal;border-color:var(--accent)}
.quick-preview.listening{border-color:var(--danger);animation:borderPulse 1s ease-in-out infinite}
@keyframes borderPulse{0%,100%{border-color:var(--danger)}50%{border-color:rgba(255,79,79,.3)}}
.preview-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:4px;line-height:1;display:none}
.quick-row{display:flex;gap:8px;margin-bottom:8px}
.quick-actions{display:flex;gap:8px}
.export-btn{flex:1;background:var(--accent);border:none;border-radius:10px;color:#0f0f0f;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:10px;cursor:pointer}
.clearall-btn{background:none;border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:12px;padding:10px 14px;cursor:pointer}
.clearall-btn:hover{border-color:var(--danger);color:var(--danger)}
.add-btn{background:var(--accent);border:none;border-radius:10px;color:#0f0f0f;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;padding:12px 16px;cursor:pointer;white-space:nowrap}
.add-btn:disabled{opacity:.3;cursor:default}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:12px 18px;font-size:13px;font-weight:500;color:var(--accent);z-index:999;max-width:340px;width:90%;text-align:center;transition:transform .35s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">🎙️ Appunti Vocali</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('notes')">📝 Appunti</div>
    <div class="tab" onclick="switchTab('quick')">⚡ Note veloci</div>
  </div>

  <!-- TAB APPUNTI -->
  <div class="tab-content active" id="tab-notes">
    <div class="notes-area">
      <textarea class="notes-text" id="notesText"
        placeholder="Ditta o scrivi… ogni dettatura va a capo automaticamente."
        oninput="saveNotes()"></textarea>
      <div class="notes-count" id="notesCount">0 parole</div>
      <div class="notes-bottom">
        <button class="mic-btn" id="notesMicBtn" onclick="toggleMic('notes')">
          <span>🎙️</span><span id="notesMicLabel">Ditta</span>
        </button>
        <button class="action-btn" onclick="copyNotes()">📋 Copia</button>
        <button class="action-btn" style="background:var(--accent)" onclick="emailNotes()">📧 Email</button>
        <button class="clear-btn" onclick="clearNotes()">🗑</button>
      </div>
    </div>
  </div>

  <!-- TAB NOTE VELOCI -->
  <div class="tab-content" id="tab-quick">
    <div class="quick-area">
      <div class="quick-list" id="quickList">
        <div class="quick-empty" id="quickEmpty">
          <div class="quick-empty-icon">⚡</div>
          <div>Ditta una nota veloce<br>e premi Aggiungi</div>
        </div>
      </div>
      <div class="quick-preview" id="quickPreview">
        <span id="quickPreviewText">Cosa vuoi annotare?</span>
        <button class="preview-clear" id="previewClearBtn" onclick="clearPreview()">✕</button>
      </div>
      <div class="quick-row">
        <button class="mic-btn" id="quickMicBtn" onclick="toggleMic('quick')">
          <span>🎙️</span><span id="quickMicLabel">Parla</span>
        </button>
        <button class="add-btn" id="addBtn" onclick="addNote()" disabled>Aggiungi</button>
      </div>
      <div class="quick-actions">
        <button class="export-btn" onclick="exportNotes()">📄 Scarica lista</button>
        <button class="clearall-btn" onclick="clearAllNotes()">🗑 Svuota</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const hasSpeech = !!SpeechRecognition;
let recognition = null;
let isRecordingNotes = false;
let isRecordingQuick = false;
let quickNotes = []; // [{text, done}]

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active',(i===0&&tab==='notes')||(i===1&&tab==='quick')));
  document.getElementById('tab-notes').classList.toggle('active', tab==='notes');
  document.getElementById('tab-quick').classList.toggle('active', tab==='quick');
}

// ===== MICROFONO =====
function toggleMic(target) {
  if (!hasSpeech) { showToast('Usa Chrome su Android'); return; }
  if (target === 'notes') {
    if (isRecordingNotes) stopMic(); else startMic('notes');
  } else {
    if (isRecordingQuick) stopMic(); else startMic('quick');
  }
}

function startMic(target) {
  if (recognition) { try { recognition.stop(); } catch(e){} }
  recognition = new SpeechRecognition();
  recognition.lang = 'it-IT';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    if (target === 'notes') {
      isRecordingNotes = true;
      document.getElementById('notesMicBtn').classList.add('recording');
      document.getElementById('notesMicLabel').textContent = 'Fermo';
    } else {
      isRecordingQuick = true;
      document.getElementById('quickMicBtn').classList.add('recording');
      document.getElementById('quickMicLabel').textContent = 'Fermo';
      document.getElementById('quickPreview').classList.add('listening');
      setPreview('Sto ascoltando…', false);
    }
  };

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let r of e.results) {
      if (r.isFinal) final += r[0].transcript;
      else interim += r[0].transcript;
    }
    if (target === 'notes') {
      const ta = document.getElementById('notesText');
      const base = ta.dataset.base || '';
      // Va a capo dopo ogni dettatura
      const sep = base ? '\n' : '';
      ta.value = base + sep + (final || interim);
      if (final) { ta.dataset.base = ta.value; saveNotes(); }
      updateNotesCount();
      ta.scrollTop = ta.scrollHeight;
    } else {
      // Per le note veloci mostra interim ma salva solo final
      if (final) {
        setPreview(final, true);
      } else if (interim) {
        // Mostra solo interim visivamente, non sovrascrive
        document.getElementById('quickPreviewText').textContent = interim;
        document.getElementById('quickPreview').classList.add('has-text');
      }
    }
  };

  recognition.onend = () => {
    if (target === 'notes') {
      isRecordingNotes = false;
      document.getElementById('notesMicBtn').classList.remove('recording');
      document.getElementById('notesMicLabel').textContent = 'Ditta';
      const ta = document.getElementById('notesText');
      ta.dataset.base = ta.value;
      saveNotes();
    } else {
      isRecordingQuick = false;
      document.getElementById('quickMicBtn').classList.remove('recording');
      document.getElementById('quickMicLabel').textContent = 'Parla';
      document.getElementById('quickPreview').classList.remove('listening');
      const txt = document.getElementById('quickPreviewText').textContent;
      if (!txt || txt === 'Sto ascoltando…') setPreview('', false);
    }
  };

  recognition.onerror = (e) => {
    try { recognition.onend(null); } catch(ex) {}
    if (e.error === 'not-allowed') showToast('Permesso microfono negato');
    else if (e.error !== 'no-speech') showToast('Errore: ' + e.error);
  };

  if (target === 'notes') {
    document.getElementById('notesText').dataset.base = document.getElementById('notesText').value;
  }
  recognition.start();
}

function stopMic() { if (recognition) { try { recognition.stop(); } catch(e){} } }

// ===== APPUNTI =====
function saveNotes() {
  localStorage.setItem('av_notes', document.getElementById('notesText').value);
  updateNotesCount();
}

function updateNotesCount() {
  const val = document.getElementById('notesText').value.trim();
  const w = val ? val.split(/\s+/).length : 0;
  document.getElementById('notesCount').textContent = w + ' parole · ' + val.length + ' car.';
}

function emailNotes() {
  const text = document.getElementById('notesText').value.trim();
  if (!text) { showToast('Nessun appunto da inviare.'); return; }
  const data = new Date().toLocaleDateString('it-IT');
  const subject = encodeURIComponent('Appunti del ' + data);
  const body = encodeURIComponent(text);
  window.location.href = 'mailto:favola2011m+appunti@gmail.com?subject=' + subject + '&body=' + body;
}

function copyNotes() {
  const text = document.getElementById('notesText').value.trim();
  if (!text) { showToast('Nessun appunto da copiare.'); return; }
  navigator.clipboard.writeText(text).then(() => showToast('📋 Copiato!'));
}

function clearNotes() {
  if (!document.getElementById('notesText').value) return;
  if (confirm('Svuotare gli appunti?')) {
    document.getElementById('notesText').value = '';
    document.getElementById('notesText').dataset.base = '';
    localStorage.removeItem('av_notes');
    updateNotesCount();
  }
}

// ===== NOTE VELOCI =====
function setPreview(text, hasContent) {
  const span = document.getElementById('quickPreviewText');
  const clearBtn = document.getElementById('previewClearBtn');
  const addBtn = document.getElementById('addBtn');
  span.textContent = text || 'Cosa vuoi annotare?';
  document.getElementById('quickPreview').classList.toggle('has-text', hasContent && !!text);
  clearBtn.style.display = (hasContent && text) ? 'block' : 'none';
  addBtn.disabled = !(hasContent && text && text.trim().length > 0);
}

function clearPreview() { setPreview('', false); }

function addNote() {
  const text = document.getElementById('quickPreviewText').textContent.trim();
  if (!text || text === 'Cosa vuoi annotare?') return;
  quickNotes.push({ text, done: false });
  saveQuick();
  renderQuick();
  setPreview('', false);
}

function toggleDone(idx) {
  if (idx < 0 || idx >= quickNotes.length) return;
  quickNotes[idx].done = !quickNotes[idx].done;
  saveQuick();
  // Aggiorna solo la card senza ricreare tutto
  const item = document.querySelector('.note-item[data-idx="'+idx+'"]');
  if (item) {
    const box = item.querySelector('.check-box');
    if (quickNotes[idx].done) {
      item.classList.add('done');
      box.classList.add('checked');
    } else {
      item.classList.remove('done');
      box.classList.remove('checked');
    }
  }
}

function renderQuick() {
  const list = document.getElementById('quickList');
  const empty = document.getElementById('quickEmpty');
  list.innerHTML = '';
  if (quickNotes.length === 0) {
    list.appendChild(empty);
    return;
  }
  quickNotes.forEach((note, i) => {
    const item = document.createElement('div');
    item.className = 'note-item' + (note.done ? ' done' : '');
    item.dataset.idx = i;
    const num = document.createElement('span');
    num.className = 'note-num';
    num.textContent = (i+1) + '.';
    const txt = document.createElement('span');
    txt.className = 'note-text';
    txt.textContent = note.text;
    txt.addEventListener('click', () => editNote(i));
    const wrap = document.createElement('div');
    wrap.className = 'check-wrap';
    const box = document.createElement('div');
    box.className = 'check-box' + (note.done ? ' checked' : '');
    wrap.appendChild(box);
    wrap.addEventListener('click', () => toggleDone(i));
    item.appendChild(num);
    item.appendChild(txt);
    item.appendChild(wrap);
    list.appendChild(item);
  });
  list.scrollTop = list.scrollHeight;
}

function editNote(idx) {
  const newText = prompt('Modifica nota:', quickNotes[idx].text);
  if (newText !== null && newText.trim()) {
    quickNotes[idx].text = newText.trim();
    saveQuick();
    renderQuick();
  }
}

function exportNotes() {
  if (!quickNotes.length) { showToast('Nessuna nota da esportare.'); return; }
  const data = new Date().toLocaleDateString('it-IT');
  const ora = new Date().toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
  const righe = quickNotes.map((n, i) => `
    <tr>
      <td style="padding:8px 12px;font-weight:700;color:#888;font-size:14px">${i+1}.</td>
      <td style="padding:8px 12px;font-size:15px;color:#222">${n.text}</td>
      <td style="padding:8px 12px;text-align:center;font-size:18px">${n.done ? '🟢' : '⬜'}</td>
    </tr>`).join('');
  const html = `<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Note veloci — ${data}</title>
<style>
  body{font-family:Arial,sans-serif;max-width:600px;margin:40px auto;padding:20px;color:#222}
  h1{font-size:22px;margin-bottom:4px;color:#111}
  .sub{font-size:13px;color:#888;margin-bottom:24px}
  table{width:100%;border-collapse:collapse}
  tr:nth-child(even){background:#f9f9f9}
  tr{border-bottom:1px solid #eee}
  .footer{margin-top:24px;font-size:12px;color:#aaa;text-align:center}
</style>
</head>
<body>
<h1>📋 Note veloci</h1>
<div class="sub">Esportate il ${data} alle ${ora}</div>
<table>
  <tr style="background:#f0f0f0">
    <th style="padding:8px 12px;text-align:left;font-size:13px">#</th>
    <th style="padding:8px 12px;text-align:left;font-size:13px">Nota</th>
    <th style="padding:8px 12px;font-size:13px">Fatto</th>
  </tr>
  ${righe}
</table>
<div class="footer">Generato da Appunti Vocali</div>
</body>
</html>`;
  const blob = new Blob([html], {type: 'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'note-veloci-' + data.replace(/\//g,'-') + '.html';
  a.click();
  URL.revokeObjectURL(url);
  showToast('📄 File scaricato!');
}

function clearAllNotes() {
  if (!quickNotes.length) return;
  if (confirm('Svuotare tutta la lista?')) {
    quickNotes = [];
    saveQuick();
    renderQuick();
  }
}

function saveQuick() {
  localStorage.setItem('av_quick', JSON.stringify(quickNotes));
}

function loadQuick() {
  try { quickNotes = JSON.parse(localStorage.getItem('av_quick') || '[]'); }
  catch(e) { quickNotes = []; }
}

// ===== UTILS =====
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let toastTimer = null;
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

// ===== INIT =====
const savedNotes = localStorage.getItem('av_notes') || '';
document.getElementById('notesText').value = savedNotes;
document.getElementById('notesText').dataset.base = savedNotes;
updateNotesCount();
loadQuick();
renderQuick();

if (!hasSpeech) {
  document.getElementById('notesMicBtn').style.display = 'none';
  document.getElementById('quickMicBtn').style.display = 'none';
}
</script>
</body>
</html>
