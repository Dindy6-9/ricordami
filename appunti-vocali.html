<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<title>Appunti Vocali</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;
  --accent:#e8ff47;--text:#f0f0f0;--text-muted:#555;--danger:#ff4f4f;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}

/* HEADER */
.header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
.info{font-size:11px;color:var(--text-muted)}

/* TESTO */
.text-area{flex:1;overflow-y:auto;padding:16px 18px}
.text-area::-webkit-scrollbar{width:3px}
.text-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.notes-display{font-size:16px;line-height:1.9;color:var(--text);white-space:pre-wrap;word-break:break-word;outline:none;min-height:100%}
.notes-display:empty::before{content:'Premi il microfono e inizia a parlare…';color:var(--text-muted);font-style:italic}
.interim{color:var(--text-muted);font-style:italic}

/* BOTTOM */
.bottom{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding:16px 18px 28px;display:flex;flex-direction:column;align-items:center;gap:14px}

/* PULSANTE MIC GRANDE */
.mic-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.mic-ring{position:absolute;width:90px;height:90px;border-radius:50%;border:2px solid var(--accent);opacity:0;transform:scale(1)}
.mic-ring.pulse{animation:ring 1.2s ease-out infinite}
@keyframes ring{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.7);opacity:0}}
.mic-big{width:72px;height:72px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:30px;transition:all .2s;box-shadow:0 4px 20px rgba(232,255,71,.2)}
.mic-big:active{transform:scale(.95)}
.mic-big.recording{background:var(--danger);box-shadow:0 4px 20px rgba(255,79,79,.3)}
.mic-label{font-size:12px;color:var(--text-muted);text-align:center}
.mic-label.recording{color:var(--danger)}

/* AZIONI */
.actions{display:flex;gap:10px;width:100%}
.btn{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:10px;cursor:pointer;transition:all .2s;text-align:center}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.danger:hover{border-color:var(--danger);color:var(--danger)}

/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:11px 18px;font-size:13px;font-weight:500;color:var(--accent);z-index:999;max-width:300px;width:90%;text-align:center;transition:transform .35s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">🎙️ Appunti Vocali</div>
    <div class="info" id="info">0 parole</div>
  </div>

  <div class="text-area" id="textArea">
    <div class="notes-display" id="display" contenteditable="true" spellcheck="true"></div>
  </div>

  <div class="bottom">
    <div class="mic-wrap">
      <div class="mic-ring" id="micRing"></div>
      <button class="mic-big" id="micBtn" onclick="toggleMic()">🎙️</button>
    </div>
    <div class="mic-label" id="micLabel">Tocca per dettare</div>
    <div class="actions">
      <button class="btn" onclick="copyAll()">📋 Copia</button>
      <button class="btn" onclick="editMode()">✏️ Modifica</button>
      <button class="btn danger" onclick="clearAll()">🗑 Svuota</button>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const hasSpeech = !!SpeechRecognition;
let recognition = null;
let isRecording = false;
let baseText = '';
let interimNode = null;

const display = document.getElementById('display');

// Carica testo salvato
baseText = localStorage.getItem('appunti_v2') || '';
display.textContent = baseText;
updateInfo();

// Salva quando l'utente modifica manualmente
display.addEventListener('input', () => {
  if (!isRecording) {
    baseText = display.innerText;
    localStorage.setItem('appunti_v2', baseText);
    updateInfo();
  }
});

function updateInfo() {
  const text = display.innerText.trim();
  const words = text ? text.split(/\s+/).length : 0;
  document.getElementById('info').textContent = words + ' parole';
}

// MICROFONO
function toggleMic() {
  if (!hasSpeech) { showToast('Usa Chrome su Android per il microfono'); return; }
  if (isRecording) stopMic();
  else startMic();
}

function startMic() {
  if (recognition) { try { recognition.stop(); } catch(e){} }
  recognition = new SpeechRecognition();
  recognition.lang = 'it-IT';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent = '⏹️';
    document.getElementById('micRing').classList.add('pulse');
    document.getElementById('micLabel').textContent = 'Sto ascoltando… tocca per fermare';
    document.getElementById('micLabel').classList.add('recording');
    // Metti cursore in fondo
    display.contentEditable = 'false';
  };

  recognition.onresult = (e) => {
    let finalChunk = '';
    let interimChunk = '';
    for (let r of e.results) {
      if (r.isFinal) finalChunk += r[0].transcript;
      else interimChunk += r[0].transcript;
    }

    if (finalChunk) {
      const sep = baseText && !baseText.endsWith('\n') ? ' ' : '';
      baseText += sep + finalChunk;
      localStorage.setItem('appunti_v2', baseText);
    }

    // Mostra testo finale + interim
    display.textContent = baseText + (interimChunk ? ' ' + interimChunk : '');
    updateInfo();
    // Scorri in fondo
    document.getElementById('textArea').scrollTop = document.getElementById('textArea').scrollHeight;
  };

  recognition.onend = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎙️';
    document.getElementById('micRing').classList.remove('pulse');
    document.getElementById('micLabel').textContent = 'Tocca per dettare';
    document.getElementById('micLabel').classList.remove('recording');
    display.contentEditable = 'true';
    display.textContent = baseText;
    updateInfo();
    localStorage.setItem('appunti_v2', baseText);
  };

  recognition.onerror = (e) => {
    try { recognition.onend(null); } catch(ex) {}
    if (e.error === 'not-allowed') showToast('Permesso microfono negato — controlla impostazioni Chrome');
    else if (e.error !== 'no-speech') showToast('Errore: ' + e.error);
  };

  recognition.start();
}

function stopMic() {
  if (recognition) { try { recognition.stop(); } catch(e){} }
}

// AZIONI
function copyAll() {
  const text = baseText.trim();
  if (!text) { showToast('Nessun appunto da copiare.'); return; }
  navigator.clipboard.writeText(text).then(() => showToast('📋 Copiato!'));
}

function editMode() {
  display.focus();
  // Metti cursore in fondo
  const range = document.createRange();
  const sel = window.getSelection();
  range.selectNodeContents(display);
  range.collapse(false);
  sel.removeAllRanges();
  sel.addRange(range);
  showToast('✏️ Ora puoi modificare il testo');
}

function clearAll() {
  if (!baseText.trim()) return;
  if (confirm('Svuotare tutti gli appunti?')) {
    baseText = '';
    display.textContent = '';
    localStorage.removeItem('appunti_v2');
    updateInfo();
    showToast('Appunti svuotati.');
  }
}

// TOAST
let toastTimer = null;
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

if (!hasSpeech) {
  document.getElementById('micBtn').style.opacity = '0.3';
  document.getElementById('micBtn').style.pointerEvents = 'none';
  document.getElementById('micLabel').textContent = 'Microfono non disponibile — usa Chrome';
}
</script>
</body>
</html>
