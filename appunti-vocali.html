<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<title>Appunti Vocali</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;
  --accent:#e8ff47;--text:#f0f0f0;--text-muted:#555;--danger:#ff4f4f;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}
.header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--accent)}
.info{font-size:11px;color:var(--text-muted)}
.text-wrap{flex:1;overflow-y:auto;padding:14px 16px}
.text-wrap::-webkit-scrollbar{width:3px}
.text-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#notesTA{width:100%;height:100%;min-height:200px;background:transparent;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.9;resize:none}
#notesTA::placeholder{color:var(--text-muted);font-style:italic}
.bottom{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding:14px 16px 26px;display:flex;flex-direction:column;align-items:center;gap:12px}
.mic-wrap{position:relative;width:80px;height:80px;display:flex;align-items:center;justify-content:center}
.ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--danger);opacity:0}
.ring.on{animation:ring 1.1s ease-out infinite}
@keyframes ring{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.8);opacity:0}}
.mic-btn{width:72px;height:72px;border-radius:50%;background:var(--accent);border:none;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.mic-btn.on{background:var(--danger)}
.mic-lbl{font-size:12px;color:var(--text-muted);text-align:center}
.mic-lbl.on{color:var(--danger);font-weight:500}
.row{display:flex;gap:8px;width:100%}
.btn{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:10px 4px;cursor:pointer;transition:all .2s;text-align:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:active{opacity:.7}
.btn.red:active{color:var(--danger);border-color:var(--danger)}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:500;color:var(--accent);z-index:999;max-width:300px;width:90%;text-align:center;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">🎙️ Appunti Vocali</div>
    <div class="info" id="info">0 parole</div>
  </div>
  <div class="text-wrap">
    <textarea id="notesTA" placeholder="Premi il microfono e inizia a parlare…"></textarea>
  </div>
  <div class="bottom">
    <div class="mic-wrap">
      <div class="ring" id="ring"></div>
      <button class="mic-btn" id="micBtn">🎙️</button>
    </div>
    <div class="mic-lbl" id="micLbl">Tocca per dettare</div>
    <div class="row">
      <button class="btn" id="btnCopy">📋 Copia</button>
      <button class="btn" id="btnClear" style="color:#ff4f4f;border-color:#2e2e2e">🗑 Svuota</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const ta = document.getElementById('notesTA');
const micBtn = document.getElementById('micBtn');
const micLbl = document.getElementById('micLbl');
const ring = document.getElementById('ring');
let rec = null, on = false, base = '';

// Carica
base = localStorage.getItem('av2') || '';
ta.value = base;
upInfo();

ta.addEventListener('input', () => {
  base = ta.value;
  localStorage.setItem('av2', base);
  upInfo();
});

function upInfo() {
  const w = ta.value.trim() ? ta.value.trim().split(/\s+/).length : 0;
  document.getElementById('info').textContent = w + ' parole';
}

// MIC
micBtn.addEventListener('click', () => {
  if (!SR) { toast('Usa Chrome su Android'); return; }
  on ? stop() : start();
});

function start() {
  if (rec) { try { rec.stop(); } catch(e){} }
  rec = new SR();
  rec.lang = 'it-IT';
  rec.continuous = true;
  rec.interimResults = true;

  rec.onstart = () => {
    on = true;
    micBtn.classList.add('on');
    micBtn.textContent = '⏹️';
    ring.classList.add('on');
    micLbl.textContent = 'Sto ascoltando… tocca per fermare';
    micLbl.classList.add('on');
  };

  rec.onresult = e => {
    let fin = '', tmp = '';
    for (let r of e.results) {
      if (r.isFinal) fin += r[0].transcript;
      else tmp += r[0].transcript;
    }
    if (fin) {
      base += (base && !base.endsWith('\n') ? ' ' : '') + fin;
      localStorage.setItem('av2', base);
    }
    ta.value = base + (tmp ? ' ' + tmp : '');
    upInfo();
    ta.scrollTop = ta.scrollHeight;
  };

  rec.onend = () => {
    on = false;
    micBtn.classList.remove('on');
    micBtn.textContent = '🎙️';
    ring.classList.remove('on');
    micLbl.textContent = 'Tocca per dettare';
    micLbl.classList.remove('on');
    base = ta.value;
    localStorage.setItem('av2', base);
    upInfo();
  };

  rec.onerror = e => {
    try { rec.onend(); } catch(x){}
    if (e.error === 'not-allowed') toast('Permesso microfono negato');
    else if (e.error !== 'no-speech') toast('Errore: ' + e.error);
  };

  rec.start();
}

function stop() { if (rec) try { rec.stop(); } catch(e){} }

document.getElementById('btnCopy').addEventListener('click', () => {
  if (!ta.value.trim()) { toast('Nessun testo da copiare'); return; }
  navigator.clipboard.writeText(ta.value.trim()).then(() => toast('📋 Copiato!'));
});

document.getElementById('btnClear').addEventListener('click', () => {
  if (!ta.value.trim()) return;
  if (confirm('Svuotare tutti gli appunti?')) {
    base = ''; ta.value = '';
    localStorage.removeItem('av2');
    upInfo();
    toast('Svuotato');
  }
});

let tt;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(tt);
  tt = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
