<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Appunti Vocali</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;
  --accent:#e8ff47;--accent-dim:rgba(232,255,71,0.12);
  --text:#f0f0f0;--text-muted:#666;--danger:#ff4f4f;--done:#3ddc84;--note:#7eb8f7;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}
.header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:-0.5px;color:var(--accent)}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none;flex:1;flex-direction:column;overflow:hidden}
.tab-content.active{display:flex}

/* APPUNTI LUNGHI */
.notes-area{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:12px 14px}
.notes-text{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.7;resize:none;outline:none;transition:border-color .2s;overflow-y:auto}
.notes-text:focus{border-color:var(--note)}
.notes-text::placeholder{color:var(--text-muted);font-style:italic}
.notes-count{font-size:11px;color:var(--text-muted);text-align:right;margin-top:5px}
.notes-bottom{margin-top:8px;display:flex;gap:8px}
.notes-mic-btn{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
.notes-mic-btn:hover{border-color:var(--note);color:var(--note)}
.notes-mic-btn.recording{background:rgba(255,79,79,.1);border-color:var(--danger);color:var(--danger);animation:recGlow 1s ease-in-out infinite}
.notes-copy-btn{background:var(--note);border:none;border-radius:10px;color:#0f0f0f;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;padding:12px 14px;cursor:pointer;white-space:nowrap}
.notes-clear-btn{background:none;border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:13px;padding:12px 14px;cursor:pointer;white-space:nowrap}
.notes-clear-btn:hover{border-color:var(--danger);color:var(--danger)}

/* NOTE VELOCI */
.quick-area{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:12px 14px}
.quick-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.quick-list::-webkit-scrollbar{width:3px}
.quick-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.quick-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px;gap:8px;opacity:.5}
.quick-empty-icon{font-size:32px}
.note-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;display:flex;align-items:flex-start;gap:10px;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.note-num{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0;min-width:22px}
.note-text{flex:1;font-size:14px;line-height:1.4;color:var(--text);word-break:break-word}
.note-del{background:none;border:none;color:var(--text-muted);font-size:15px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;transition:color .2s}
.note-del:hover{color:var(--danger)}
.quick-bottom{display:flex;flex-direction:column;gap:8px}
.quick-preview{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 32px 10px 12px;font-size:13px;color:var(--text-muted);min-height:42px;display:flex;align-items:center;font-style:italic;position:relative;transition:border-color .2s}
.quick-preview.has-text{color:var(--text);font-style:normal;border-color:var(--accent)}
.quick-preview.listening{border-color:var(--danger);animation:borderPulse 1s ease-in-out infinite}
@keyframes borderPulse{0%,100%{border-color:var(--danger)}50%{border-color:rgba(255,79,79,.3)}}
.quick-clear-preview{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:4px;line-height:1;display:none}
.quick-row{display:flex;gap:8px}
.quick-mic-btn{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
.quick-mic-btn:hover{border-color:var(--accent);color:var(--accent)}
.quick-mic-btn.recording{background:rgba(255,79,79,.1);border-color:var(--danger);color:var(--danger);animation:recGlow 1s ease-in-out infinite}
@keyframes recGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,79,79,0)}50%{box-shadow:0 0 10px 2px rgba(255,79,79,.2)}}
.quick-add-btn{background:var(--accent);border:none;border-radius:10px;color:#0f0f0f;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;padding:12px 16px;cursor:pointer;white-space:nowrap}
.quick-add-btn:disabled{opacity:.3;cursor:default}
.quick-actions{display:flex;gap:8px}
.quick-copy-btn{flex:1;background:var(--note);border:none;border-radius:10px;color:#0f0f0f;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:10px;cursor:pointer}
.quick-clearall-btn{background:none;border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:12px;padding:10px 14px;cursor:pointer}
.quick-clearall-btn:hover{border-color:var(--danger);color:var(--danger)}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:12px 18px;font-size:13px;font-weight:500;color:var(--accent);z-index:999;max-width:340px;width:90%;text-align:center;transition:transform .35s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">🎙️ Appunti Vocali</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('notes')">📝 Appunti</div>
    <div class="tab" onclick="switchTab('quick')">⚡ Note veloci</div>
  </div>

  <!-- TAB APPUNTI LUNGHI -->
  <div class="tab-content active" id="tab-notes">
    <div class="notes-area">
      <textarea class="notes-text" id="notesText"
        placeholder="Parla o scrivi… ogni dettatura viene aggiunta in coda."
        oninput="saveNotes()"></textarea>
      <div class="notes-count" id="notesCount">0 parole</div>
      <div class="notes-bottom">
        <button class="notes-mic-btn" id="notesMicBtn" onclick="toggleMic('notes')">
          <span>🎙️</span><span id="notesMicLabel">Ditta appunto</span>
        </button>
        <button class="notes-copy-btn" onclick="copyNotes()">Copia</button>
        <button class="notes-clear-btn" onclick="clearNotes()">🗑</button>
      </div>
    </div>
  </div>

  <!-- TAB NOTE VELOCI -->
  <div class="tab-content" id="tab-quick">
    <div class="quick-area">
      <div class="quick-list" id="quickList">
        <div class="quick-empty" id="quickEmpty">
          <div class="quick-empty-icon">⚡</div>
          <div>Ditta una nota veloce</div>
        </div>
      </div>
      <div class="quick-bottom">
        <div class="quick-preview" id="quickPreview">
          <span id="quickPreviewText">Cosa vuoi annotare?</span>
          <button class="quick-clear-preview" id="quickClearBtn" onclick="clearQuickPreview()">✕</button>
        </div>
        <div class="quick-row">
          <button class="quick-mic-btn" id="quickMicBtn" onclick="toggleMic('quick')">
            <span>🎙️</span><span id="quickMicLabel">Parla</span>
          </button>
          <button class="quick-add-btn" id="quickAddBtn" onclick="addQuickNote()" disabled>Aggiungi</button>
        </div>
        <div class="quick-actions">
          <button class="quick-copy-btn" onclick="copyQuick()">📋 Copia lista</button>
          <button class="quick-clearall-btn" onclick="clearAllQuick()">🗑 Svuota lista</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const hasSpeech = !!SpeechRecognition;
let recognition = null;
let isRecordingNotes = false;
let isRecordingQuick = false;
let quickNotes = [];

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active',(i===0&&tab==='notes')||(i===1&&tab==='quick')));
  document.getElementById('tab-notes').classList.toggle('active', tab==='notes');
  document.getElementById('tab-quick').classList.toggle('active', tab==='quick');
}

// ===== MICROFONO =====
function toggleMic(target) {
  if (!hasSpeech) { showToast('Usa Chrome su Android per il microfono'); return; }
  if (target === 'notes') {
    if (isRecordingNotes) stopMic(); else startMic('notes');
  } else {
    if (isRecordingQuick) stopMic(); else startMic('quick');
  }
}

function startMic(target) {
  if (recognition) { try { recognition.stop(); } catch(e){} }
  recognition = new SpeechRecognition();
  recognition.lang = 'it-IT';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    if (target === 'notes') {
      isRecordingNotes = true;
      document.getElementById('notesMicBtn').classList.add('recording');
      document.getElementById('notesMicLabel').textContent = 'Fermo';
    } else {
      isRecordingQuick = true;
      document.getElementById('quickMicBtn').classList.add('recording');
      document.getElementById('quickMicLabel').textContent = 'Fermo';
      document.getElementById('quickPreview').classList.add('listening');
      setQuickPreview('Sto ascoltando…', false);
    }
  };

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let r of e.results) {
      if (r.isFinal) final += r[0].transcript;
      else interim += r[0].transcript;
    }
    if (target === 'notes') {
      const ta = document.getElementById('notesText');
      const base = ta.dataset.base || '';
      const sep = base ? ' ' : '';
      ta.value = base + sep + (final || interim);
      if (final) { ta.dataset.base = ta.value; saveNotes(); }
      updateNotesCount();
    } else {
      setQuickPreview(final || interim, !!(final || interim));
    }
  };

  recognition.onend = () => {
    if (target === 'notes') {
      isRecordingNotes = false;
      document.getElementById('notesMicBtn').classList.remove('recording');
      document.getElementById('notesMicLabel').textContent = 'Ditta appunto';
      const ta = document.getElementById('notesText');
      ta.dataset.base = ta.value;
      saveNotes();
    } else {
      isRecordingQuick = false;
      document.getElementById('quickMicBtn').classList.remove('recording');
      document.getElementById('quickMicLabel').textContent = 'Parla';
      document.getElementById('quickPreview').classList.remove('listening');
      const txt = document.getElementById('quickPreviewText').textContent;
      if (!txt || txt === 'Sto ascoltando…') setQuickPreview('', false);
    }
  };

  recognition.onerror = (e) => {
    try { recognition.onend(null); } catch(ex) {}
    if (e.error === 'not-allowed') showToast('Permesso microfono negato');
    else if (e.error !== 'no-speech') showToast('Errore microfono: ' + e.error);
  };

  // Base per appunti
  if (target === 'notes') {
    const ta = document.getElementById('notesText');
    ta.dataset.base = ta.value;
  }

  recognition.start();
}

function stopMic() { if (recognition) { try { recognition.stop(); } catch(e){} } }

// ===== APPUNTI =====
function saveNotes() {
  const val = document.getElementById('notesText').value;
  localStorage.setItem('av_notes', val);
  updateNotesCount();
}

function updateNotesCount() {
  const val = document.getElementById('notesText').value.trim();
  const w = val ? val.split(/\s+/).length : 0;
  document.getElementById('notesCount').textContent = w + ' parole · ' + val.length + ' car.';
}

function copyNotes() {
  const text = document.getElementById('notesText').value.trim();
  if (!text) { showToast('Nessun appunto da copiare.'); return; }
  navigator.clipboard.writeText(text).then(() => showToast('📋 Copiato!'));
}

function clearNotes() {
  if (!document.getElementById('notesText').value) return;
  if (confirm('Svuotare gli appunti?')) {
    document.getElementById('notesText').value = '';
    document.getElementById('notesText').dataset.base = '';
    localStorage.removeItem('av_notes');
    updateNotesCount();
  }
}

// ===== NOTE VELOCI =====
function setQuickPreview(text, hasContent) {
  const span = document.getElementById('quickPreviewText');
  const clearBtn = document.getElementById('quickClearBtn');
  const addBtn = document.getElementById('quickAddBtn');
  span.textContent = text || 'Cosa vuoi annotare?';
  document.getElementById('quickPreview').classList.toggle('has-text', hasContent && !!text);
  clearBtn.style.display = (hasContent && text) ? 'block' : 'none';
  addBtn.disabled = !(hasContent && text && text.trim().length > 0);
}

function clearQuickPreview() { setQuickPreview('', false); }

function addQuickNote() {
  const text = document.getElementById('quickPreviewText').textContent.trim();
  if (!text || text === 'Cosa vuoi annotare?') return;
  quickNotes.push(text);
  saveQuick();
  renderQuick();
  setQuickPreview('', false);
  showToast('✅ Nota aggiunta!');
}

function deleteQuickNote(idx) {
  quickNotes.splice(idx, 1);
  saveQuick();
  renderQuick();
}

function renderQuick() {
  const list = document.getElementById('quickList');
  const empty = document.getElementById('quickEmpty');
  list.innerHTML = '';
  if (quickNotes.length === 0) {
    list.appendChild(empty);
    return;
  }
  quickNotes.forEach((text, i) => {
    const item = document.createElement('div');
    item.className = 'note-item';
    item.innerHTML = `
      <span class="note-num">${i + 1}.</span>
      <span class="note-text">${esc(text)}</span>
      <button class="note-del" onclick="deleteQuickNote(${i})">✕</button>
    `;
    list.appendChild(item);
  });
  // Scorri in fondo
  list.scrollTop = list.scrollHeight;
}

function copyQuick() {
  if (!quickNotes.length) { showToast('Nessuna nota da copiare.'); return; }
  const text = quickNotes.map((n, i) => `${i+1}. ${n}`).join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('📋 Lista copiata!'));
}

function clearAllQuick() {
  if (!quickNotes.length) return;
  if (confirm('Svuotare tutta la lista?')) {
    quickNotes = [];
    saveQuick();
    renderQuick();
  }
}

function saveQuick() {
  localStorage.setItem('av_quick', JSON.stringify(quickNotes));
}

function loadQuick() {
  try { quickNotes = JSON.parse(localStorage.getItem('av_quick') || '[]'); } catch(e) { quickNotes = []; }
}

// ===== UTILS =====
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let toastTimer = null;
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

// ===== INIT =====
const savedNotes = localStorage.getItem('av_notes') || '';
document.getElementById('notesText').value = savedNotes;
document.getElementById('notesText').dataset.base = savedNotes;
updateNotesCount();
loadQuick();
renderQuick();

if (!hasSpeech) {
  document.getElementById('notesMicBtn').style.display = 'none';
  document.getElementById('quickMicBtn').style.display = 'none';
}
</script>
</body>
</html>
