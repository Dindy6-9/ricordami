<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Ricordami</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;
  --accent:#e8ff47;--accent-dim:rgba(232,255,71,0.12);
  --text:#f0f0f0;--text-muted:#666;--danger:#ff4f4f;--done:#3ddc84;--note:#7eb8f7;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}
.header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:-0.5px;color:var(--accent)}
.notif-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-muted);font-size:11px;padding:5px 9px;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.notif-btn.granted{color:var(--done);border-color:var(--done)}
.notif-btn:hover{border-color:var(--accent);color:var(--accent)}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none;flex:1;flex-direction:column;overflow:hidden}
.tab-content.active{display:flex}
.list-area{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.list-area::-webkit-scrollbar{width:3px}
.list-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-muted);text-align:center;padding:40px 20px}
.empty-icon{font-size:36px;opacity:.4}
.empty-text{font-size:13px;line-height:1.5}
.reminder-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;animation:slideIn .25s ease;transition:opacity .3s,transform .3s}
.reminder-card.done-anim{opacity:0;transform:translateX(60px)}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-left{flex:1;min-width:0}
.card-text{font-size:14px;font-weight:500;line-height:1.4;color:var(--text);word-break:break-word}
.card-timer{font-size:11px;color:var(--text-muted);margin-top:4px;display:flex;align-items:center;gap:4px}
.timer-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.card-del{background:none;border:none;color:var(--text-muted);font-size:15px;cursor:pointer;padding:2px 4px;border-radius:6px;line-height:1;transition:color .2s;flex-shrink:0}
.card-del:hover{color:var(--danger)}
.bottom-panel{background:var(--surface);border-top:1px solid var(--border);padding:12px 16px 20px;flex-shrink:0}
.time-mode-row{display:flex;gap:6px;margin-bottom:10px}
.mode-btn{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;padding:7px 4px;cursor:pointer;transition:all .15s;text-align:center}
.mode-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.time-selector{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.time-btn{flex:1;min-width:0;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;padding:7px 2px;cursor:pointer;transition:all .15s;text-align:center;white-space:nowrap}
.time-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.datetime-row{display:flex;gap:8px;margin-bottom:10px}
.datetime-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:8px 10px;outline:none;transition:border-color .2s}
.datetime-row input:focus{border-color:var(--accent)}
.datetime-row input::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.5;cursor:pointer}
.transcript-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 32px 10px 12px;font-size:13px;color:var(--text-muted);min-height:44px;display:flex;align-items:center;margin-bottom:10px;transition:border-color .2s;font-style:italic;line-height:1.4;cursor:text;position:relative}
.transcript-box.has-text{color:var(--text);font-style:normal;border-color:var(--accent)}
.transcript-box.listening{border-color:var(--danger);animation:borderPulse 1s ease-in-out infinite}
@keyframes borderPulse{0%,100%{border-color:var(--danger)}50%{border-color:rgba(255,79,79,.3)}}
.clear-text{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:4px;line-height:1}
.clear-text:hover{color:var(--text)}
.action-row{display:flex;gap:8px}
.mic-btn{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
.mic-btn:hover{border-color:var(--accent);color:var(--accent)}
.mic-btn.recording{background:rgba(255,79,79,.1);border-color:var(--danger);color:var(--danger);animation:recGlow 1s ease-in-out infinite}
@keyframes recGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,79,79,0)}50%{box-shadow:0 0 10px 2px rgba(255,79,79,.2)}}
.add-btn{background:var(--accent);border:none;border-radius:10px;color:#0f0f0f;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;padding:12px 18px;cursor:pointer;transition:all .15s;white-space:nowrap}
.add-btn:hover{background:#d4eb3e}
.add-btn:disabled{opacity:.3;cursor:default}
/* NOTE */
.notes-area{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:12px 14px}
.notes-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.notes-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px}
.notes-action-btn{background:none;border:1px solid var(--border);border-radius:7px;color:var(--text-muted);font-size:11px;padding:5px 9px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.notes-action-btn:hover{border-color:var(--danger);color:var(--danger)}
.notes-text{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.7;resize:none;outline:none;transition:border-color .2s;overflow-y:auto}
.notes-text:focus{border-color:var(--note)}
.notes-text::placeholder{color:var(--text-muted);font-style:italic}
.notes-count{font-size:11px;color:var(--text-muted);text-align:right;margin-top:5px}
.notes-bottom{margin-top:8px;display:flex;gap:8px}
.notes-mic-btn{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
.notes-mic-btn:hover{border-color:var(--note);color:var(--note)}
.notes-mic-btn.recording{background:rgba(255,79,79,.1);border-color:var(--danger);color:var(--danger);animation:recGlow 1s ease-in-out infinite}
.notes-copy-btn{background:var(--note);border:none;border-radius:10px;color:#0f0f0f;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;padding:11px 16px;cursor:pointer;transition:all .15s;white-space:nowrap}
.notes-copy-btn:hover{opacity:.85}
/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:12px 18px;font-size:13px;font-weight:500;color:var(--accent);z-index:999;max-width:340px;width:90%;text-align:center;transition:transform .35s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.note-toast{border-color:var(--note);color:var(--note)}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">Ricordami</div>
    <button class="notif-btn" id="notifBtn" onclick="requestNotifications()">🔔 Abilita notifiche</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('reminder')">⏰ Promemoria</div>
    <div class="tab" onclick="switchTab('notes')">📝 Appunti</div>
  </div>

  <!-- TAB PROMEMORIA -->
  <div class="tab-content active" id="tab-reminder">
    <div class="list-area" id="listArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">⏰</div>
        <div class="empty-text">Nessun promemoria attivo.<br>Parla o scrivi cosa devi fare.</div>
      </div>
    </div>

    <div class="bottom-panel">
      <div class="time-mode-row">
        <button class="mode-btn active" id="modeTimer" onclick="setMode('timer')">⏱ Tra poco</button>
        <button class="mode-btn" id="modeDate" onclick="setMode('date')">📅 Data e ora</button>
      </div>

      <div class="time-selector" id="timerPanel">
        <button class="time-btn active" data-min="2" onclick="selectTime(this)">2 min</button>
        <button class="time-btn" data-min="5" onclick="selectTime(this)">5 min</button>
        <button class="time-btn" data-min="10" onclick="selectTime(this)">10 min</button>
        <button class="time-btn" data-min="15" onclick="selectTime(this)">15 min</button>
        <button class="time-btn" data-min="30" onclick="selectTime(this)">30 min</button>
        <button class="time-btn" data-min="60" onclick="selectTime(this)">1 ora</button>
        <button class="time-btn" data-min="720" onclick="selectTime(this)">12 ore</button>
        <button class="time-btn" data-min="1440" onclick="selectTime(this)">24 ore</button>
      </div>

      <div class="datetime-row" id="datePanel" style="display:none">
        <input type="date" id="dateInput">
        <input type="time" id="timeInput">
      </div>

      <div class="transcript-box" id="transcriptBox" onclick="boxClick(event)">
        <span id="transcriptText">Cosa devi fare?</span>
        <button class="clear-text" id="clearBtn" style="display:none" onclick="clearText()">✕</button>
      </div>

      <div class="action-row">
        <button class="mic-btn" id="micBtn" onclick="toggleMic('reminder')">
          <span>🎙️</span><span id="micLabel">Parla</span>
        </button>
        <button class="add-btn" id="addBtn" onclick="addReminder()" disabled>Aggiungi</button>
      </div>
    </div>
  </div>

  <!-- TAB APPUNTI -->
  <div class="tab-content" id="tab-notes">
    <div class="notes-area">
      <div class="notes-header">
        <span class="notes-title">📝 Blocco note vocale</span>
        <button class="notes-action-btn" onclick="clearNotes()">🗑 Svuota</button>
      </div>
      <textarea class="notes-text" id="notesText" placeholder="Parla o scrivi i tuoi appunti… ogni dettatura viene aggiunta in coda." oninput="updateNotesCount()"></textarea>
      <div class="notes-count" id="notesCount">0 caratteri</div>
      <div class="notes-bottom">
        <button class="notes-mic-btn" id="notesMicBtn" onclick="toggleMic('notes')">
          <span>🎙️</span><span id="notesMicLabel">Ditta appunto</span>
        </button>
        <button class="notes-copy-btn" onclick="copyNotes()">Copia tutto</button>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
let selectedMinutes = 2;
let currentMode = 'timer';
let isRecordingReminder = false;
let isRecordingNotes = false;
let recognition = null;
let reminders = [];
let nextId = 1;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const hasSpeech = !!SpeechRecognition;

// TABS
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='reminder')||(i===1&&tab==='notes')));
  document.getElementById('tab-reminder').classList.toggle('active',tab==='reminder');
  document.getElementById('tab-notes').classList.toggle('active',tab==='notes');
}

// MODALITA' TEMPO
function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeTimer').classList.toggle('active',mode==='timer');
  document.getElementById('modeDate').classList.toggle('active',mode==='date');
  document.getElementById('timerPanel').style.display = mode==='timer'?'flex':'none';
  document.getElementById('datePanel').style.display = mode==='date'?'flex':'none';
  if(mode==='date') initDatetime();
}

function initDatetime() {
  const now = new Date();
  now.setMinutes(now.getMinutes()+10);
  if(!document.getElementById('dateInput').value)
    document.getElementById('dateInput').value = now.toISOString().slice(0,10);
  if(!document.getElementById('timeInput').value)
    document.getElementById('timeInput').value = now.toTimeString().slice(0,5);
}

function selectTime(btn) {
  document.querySelectorAll('.time-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedMinutes = parseInt(btn.dataset.min);
}

// MICROFONO
function toggleMic(target) {
  if(!hasSpeech){showToast('Microfono non supportato. Usa Chrome su Android.');return;}
  if(target==='reminder'){
    if(isRecordingReminder) stopMic();
    else startMic('reminder');
  } else {
    if(isRecordingNotes) stopMic();
    else startMic('notes');
  }
}

function startMic(target) {
  if(recognition){try{recognition.stop();}catch(e){}}
  recognition = new SpeechRecognition();
  recognition.lang = 'it-IT';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    if(target==='reminder'){
      isRecordingReminder=true;
      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('micLabel').textContent='Fermo';
      document.getElementById('transcriptBox').classList.add('listening');
      setTranscript('Sto ascoltando…',false);
    } else {
      isRecordingNotes=true;
      document.getElementById('notesMicBtn').classList.add('recording');
      document.getElementById('notesMicLabel').textContent='Fermo';
    }
  };

  recognition.onresult = (e) => {
    let interim='', final='';
    for(let r of e.results){
      if(r.isFinal) final+=r[0].transcript;
      else interim+=r[0].transcript;
    }
    if(target==='reminder'){
      setTranscript(final||interim,!!(final||interim));
    } else {
      const base = document.getElementById('notesText').dataset.base||'';
      const appended = (base&&(final||interim)) ? base+' '+(final||interim) : base+(final||interim);
      document.getElementById('notesText').value = appended;
      updateNotesCount();
    }
  };

  recognition.onend = () => {
    if(target==='reminder'){
      isRecordingReminder=false;
      document.getElementById('micBtn').classList.remove('recording');
      document.getElementById('micLabel').textContent='Parla';
      document.getElementById('transcriptBox').classList.remove('listening');
      const txt=document.getElementById('transcriptText').textContent;
      if(!txt||txt==='Sto ascoltando…') setTranscript('',false);
    } else {
      isRecordingNotes=false;
      document.getElementById('notesMicBtn').classList.remove('recording');
      document.getElementById('notesMicLabel').textContent='Ditta appunto';
      document.getElementById('notesText').dataset.base=document.getElementById('notesText').value;
      updateNotesCount();
    }
  };

  recognition.onerror = (e) => {
    try{recognition.onend(null);}catch(ex){}
    if(e.error!=='no-speech') showToast('Errore microfono: '+e.error);
  };

  if(target==='notes'){
    const cur=document.getElementById('notesText').value;
    document.getElementById('notesText').dataset.base = cur?(cur+'\n'):cur;
  }
  recognition.start();
}

function stopMic(){if(recognition){try{recognition.stop();}catch(e){}}}

// PROMEMORIA TESTO
function setTranscript(text,hasContent){
  const span=document.getElementById('transcriptText');
  const box=document.getElementById('transcriptBox');
  const clearBtn=document.getElementById('clearBtn');
  const addBtn=document.getElementById('addBtn');
  span.textContent=text||'Cosa devi fare?';
  box.classList.toggle('has-text',hasContent&&!!text);
  clearBtn.style.display=(hasContent&&text)?'block':'none';
  addBtn.disabled=!(hasContent&&text&&text.trim().length>0);
}
function clearText(){setTranscript('',false);}
function boxClick(e){
  if(e.target.id==='clearBtn') return;
  const cur=document.getElementById('transcriptText').textContent;
  const val=cur==='Cosa devi fare?'?'':cur;
  const input=prompt('Scrivi il promemoria:',val);
  if(input!==null&&input.trim()) setTranscript(input.trim(),true);
}

// AGGIUNGI PROMEMORIA
function addReminder(){
  const text=document.getElementById('transcriptText').textContent.trim();
  if(!text||text==='Cosa devi fare?') return;
  let ms,label;
  if(currentMode==='timer'){
    ms=selectedMinutes*60*1000;
    label=formatMin(selectedMinutes);
  } else {
    const dateVal=document.getElementById('dateInput').value;
    const timeVal=document.getElementById('timeInput').value;
    if(!dateVal||!timeVal){showToast('Imposta data e ora prima.');return;}
    const target=new Date(dateVal+'T'+timeVal);
    ms=target.getTime()-Date.now();
    if(ms<=0){showToast('⚠️ La data è nel passato!');return;}
    label=target.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit'})+' alle '+timeVal;
  }
  const id=nextId++;
  const fireAt=Date.now()+ms;
  const reminder={id,text,label,fireAt,timerId:null};
  reminder.timerId=setTimeout(()=>fireReminder(id),ms);
  reminders.push(reminder);
  renderList();
  clearText();
  showToast('⏱ Ricorderò '+(currentMode==='timer'?'tra '+label:'il '+label));
}

function fireReminder(id){
  const r=reminders.find(x=>x.id===id);
  if(!r) return;
  if(Notification.permission==='granted'){
    new Notification('🔔 Ricordami',{
      body:r.text,requireInteraction:true,
      icon:'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔔</text></svg>'
    });
  }
  showToast('🔔 '+r.text,6000);
  const card=document.getElementById('card-'+id);
  if(card){
    card.classList.add('done-anim');
    setTimeout(()=>{reminders=reminders.filter(x=>x.id!==id);renderList();},350);
  }
}

function deleteReminder(id){
  const r=reminders.find(x=>x.id===id);
  if(r&&r.timerId) clearTimeout(r.timerId);
  const card=document.getElementById('card-'+id);
  if(card){
    card.classList.add('done-anim');
    setTimeout(()=>{reminders=reminders.filter(x=>x.id!==id);renderList();},300);
  }
}

function renderList(){
  const area=document.getElementById('listArea');
  const empty=document.getElementById('emptyState');
  if(reminders.length===0){area.innerHTML='';area.appendChild(empty);return;}
  if(empty.parentNode) empty.parentNode.removeChild(empty);
  const existing=new Set([...area.querySelectorAll('.reminder-card')].map(c=>c.id));
  const current=new Set(reminders.map(r=>'card-'+r.id));
  existing.forEach(cid=>{if(!current.has(cid)){const el=document.getElementById(cid);if(el)el.remove();}});
  reminders.forEach(r=>{
    if(!document.getElementById('card-'+r.id)){
      const card=document.createElement('div');
      card.className='reminder-card';card.id='card-'+r.id;
      card.innerHTML=`<div class="card-left">
        <div class="card-text">${esc(r.text)}</div>
        <div class="card-timer"><span class="timer-dot"></span><span class="countdown" data-fire="${r.fireAt}">…</span></div>
      </div><button class="card-del" onclick="deleteReminder(${r.id})">✕</button>`;
      area.appendChild(card);
    }
  });
}

setInterval(()=>{
  document.querySelectorAll('.countdown').forEach(el=>{
    const diff=Math.max(0,parseInt(el.dataset.fire)-Date.now());
    const sec=Math.floor(diff/1000);
    const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
    if(h>0) el.textContent=`tra ${h}h ${m}m`;
    else if(m>0) el.textContent=`tra ${m}m ${s}s`;
    else el.textContent=`tra ${s}s`;
  });
},1000);

// APPUNTI
function updateNotesCount(){
  document.getElementById('notesCount').textContent=document.getElementById('notesText').value.length+' caratteri';
}
function clearNotes(){
  if(!document.getElementById('notesText').value) return;
  if(confirm('Svuotare tutti gli appunti?')){
    document.getElementById('notesText').value='';
    document.getElementById('notesText').dataset.base='';
    updateNotesCount();
  }
}
function copyNotes(){
  const text=document.getElementById('notesText').value;
  if(!text){showToast('Nessun appunto da copiare.');return;}
  navigator.clipboard.writeText(text).then(()=>showToast('📋 Appunti copiati!',2000,true));
}

// NOTIFICHE
async function requestNotifications(){
  if(!('Notification' in window)){showToast('Apri questa pagina in Chrome per le notifiche.');return;}
  const result=await Notification.requestPermission();
  updateNotifBtn(result);
  if(result==='granted') showToast('✅ Notifiche abilitate!');
  else showToast('Notifiche non abilitate — vedrai solo il banner in-app.');
}
function updateNotifBtn(perm){
  const btn=document.getElementById('notifBtn');
  if(perm==='granted'){btn.textContent='✅ Notifiche attive';btn.classList.add('granted');}
  else{btn.textContent='🔔 Abilita notifiche';btn.classList.remove('granted');}
}

// UTILS
function formatMin(m){
  if(m<60) return m+' minut'+(m===1?'o':'i');
  const h=m/60;return h+(h===1?' ora':' ore');
}
let toastTimer=null;
function showToast(msg,duration=3000,noteStyle=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(noteStyle?' note-toast':'');
  t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),duration);
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// INIT
if('Notification' in window) updateNotifBtn(Notification.permission);
if(!hasSpeech){
  document.getElementById('micBtn').style.display='none';
  document.getElementById('notesMicBtn').style.display='none';
}
</script>
